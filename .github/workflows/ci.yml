name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Só roda se as credenciais de teste estiverem configuradas como GitHub Secrets
    if: ${{ vars.E2E_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
        env:
          E2E_BASE_URL:      ${{ secrets.E2E_BASE_URL }}
          E2E_SINDICO_EMAIL: ${{ secrets.E2E_SINDICO_EMAIL }}
          E2E_SINDICO_PASS:  ${{ secrets.E2E_SINDICO_PASS }}
          E2E_ADMIN_EMAIL:   ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASS:    ${{ secrets.E2E_ADMIN_PASS }}
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
